name: user_engagement
nodes:
  - name: ingest
    node_type: ingest
    status: ok
    sql: "SELECT * FROM raw_events"
  - name: clean
    node_type: clean
    status: ok
    sql: "SELECT session_id, user_id, event_type, is_churned FROM ingest WHERE is_churned = FALSE"
  - name: aggregate
    node_type: aggregate
    status: ok
    sql: "SELECT user_id, COUNT(event_type) as event_count FROM clean GROUP BY user_id"
  - name: output
    node_type: output
    status: ok
    sql: "SELECT * FROM aggregate"
mock_data:
  raw_events:
    - {"session_id": "s1", "user_id": 201, "event_type": "click", "is_churned": false}
    - {"session_id": "s2", "user_id": 201, "event_type": "view", "is_churned": false}
    - {"session_id": "s3", "user_id": 202, "event_type": "click", "is_churned": true}
    - {"session_id": "s4", "user_id": 203, "event_type": "login", "is_churned": false}
